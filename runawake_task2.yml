---
- name: Start wake task
  hosts: windows
  gather_facts: false

  tasks:
    - name: Get wake task state
      ansible.windows.win_shell: |
        (Get-ScheduledTask -TaskName "Daily Wake and Keep Awake").State
      register: wake_task_state
      changed_when: false

    - name: Start wake task only when not already running
      ansible.windows.win_shell: |
        Start-ScheduledTask -TaskName "Daily Wake and Keep Awake"
      when: wake_task_state.stdout | trim != "Running"
      changed_when: true

    - name: Read final wake task state
      ansible.windows.win_shell: |
        Start-Sleep -Seconds 2
        (Get-ScheduledTask -TaskName "Daily Wake and Keep Awake").State
      register: final_wake_task_state
      changed_when: false

    - name: Display wake task state
      ansible.builtin.debug:
        msg: "Daily Wake and Keep Awake state: {{ final_wake_task_state.stdout | trim }}"
