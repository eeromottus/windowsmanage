- name: Check wake task state
  ansible.windows.win_shell: |
    (Get-ScheduledTask -TaskName 'Daily Wake and Keep Awake').State
  register: wake_task_state
  changed_when: false

- name: Start wake task
  ansible.windows.win_shell: |
    Start-ScheduledTask -TaskName 'Daily Wake and Keep Awake'
  when: wake_task_state.stdout | trim != 'Running'
  changed_when: true

- name: Wait briefly for task state
  ansible.windows.win_shell: |
    Start-Sleep -Seconds 2
    (Get-ScheduledTask -TaskName 'Daily Wake and Keep Awake').State
  register: final_task_state
  changed_when: false

- name: Show wake task state
  ansible.builtin.debug:
    var: final_task_state.stdout
