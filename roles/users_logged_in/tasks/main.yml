- name: Check for interactive logon sessions
  ansible.windows.win_shell: |
    $sessions = quser 2>$null

    if ($LASTEXITCODE -ne 0 -or @($sessions).Count -le 1) {
        Write-Output "NO_USERS"
    }
    else {
        Write-Output "USERS_LOGGED_IN"
        $sessions
    }
  register: login_status
  changed_when: false

- name: Set interactive user status
  ansible.builtin.set_fact:
    users_logged_in: "{{ 'USERS_LOGGED_IN' in login_status.stdout }}"
