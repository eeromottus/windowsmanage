---
- name: Allow localeero interactive login
  hosts: windows
  gather_facts: false

  tasks:
    - name: Remove localeero from Deny log on locally
      ansible.windows.win_user_right:
        name: SeDenyInteractiveLogonRight
        users:
          - ".\localeero"
        action: remove

    - name: Remove localeero from Deny RDP logon
      ansible.windows.win_user_right:
        name: SeDenyRemoteInteractiveLogonRight
        users:
          - ".\localeero"
        action: remove

    - name: Force Group Policy refresh
      ansible.windows.win_command: gpupdate /force

    - name: Reboot Windows
      ansible.windows.win_reboot:
        reboot_timeout: 600
