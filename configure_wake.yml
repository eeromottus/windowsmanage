---
- name: Wake Windows computers at 22:00 and keep them awake for two hours
  hosts: windows
  gather_facts: false
  serial: 1

  vars:
    maintenance_start_time: "22:00"
    maintenance_duration_minutes: 120
    maintenance_directory: 'C:\ProgramData\AnsibleMaintenance'
    maintenance_script: 'C:\ProgramData\AnsibleMaintenance\keep-awake.ps1'
    maintenance_log: 'C:\ProgramData\AnsibleMaintenance\maintenance.log'
    maintenance_task_name: 'Ansible Maintenance Wake'

  tasks:
    - name: Create maintenance directory
      ansible.windows.win_file:
        path: "{{ maintenance_directory }}"
        state: directory

    - name: Install keep-awake PowerShell script
      ansible.windows.win_copy:
        dest: "{{ maintenance_script }}"
        content: |
          param(
              [int]$DurationMinutes = {{ maintenance_duration_minutes }}
          )

          $ErrorActionPreference = 'Stop'

          Add-Type @'
          using System;
          using System.Runtime.InteropServices;

          public static class NativePower
          {
              [DllImport("kernel32.dll", SetLastError = true)]
              public static extern uint SetThreadExecutionState(uint esFlags);
          }
          '@

          $ES_SYSTEM_REQUIRED = [uint32]0x00000001
          $ES_CONTINUOUS      = [uint32]0x80000000
          $flags = $ES_CONTINUOUS -bor $ES_SYSTEM_REQUIRED

          $logFile = {{ maintenance_log | to_json }}
          $startTime = Get-Date
          $endTime = $startTime.AddMinutes($DurationMinutes)

          try {
              $result = [NativePower]::SetThreadExecutionState($flags)
              if ($result -eq 0) {
                  throw 'SetThreadExecutionState failed.'
              }

              "START $(Get-Date -Format o); keep awake until $($endTime.ToString('o'))" |
                  Out-File -FilePath $logFile -Append -Encoding utf8

              while ((Get-Date) -lt $endTime) {
                  # Renew the request so the machine cannot return to sleep.
                  [void][NativePower]::SetThreadExecutionState($flags)
                  "ALIVE $(Get-Date -Format o)" |
                      Out-File -FilePath $logFile -Append -Encoding utf8
                  Start-Sleep -Seconds 300
              }

              "FINISH $(Get-Date -Format o)" |
                  Out-File -FilePath $logFile -Append -Encoding utf8
          }
          catch {
              "ERROR $(Get-Date -Format o); $($_.Exception.Message)" |
                  Out-File -FilePath $logFile -Append -Encoding utf8
              throw
          }
          finally {
              [void][NativePower]::SetThreadExecutionState($ES_CONTINUOUS)
          }

    - name: Enable wake timers in the active power plan
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          $subSleep = '238c9fa8-0aad-41ed-83f4-97be242c8f20'
          $wakeTimer = 'bd3b718a-0680-4d9d-8ab2-e1d2b4ac806d'

          & powercfg.exe /SETACVALUEINDEX SCHEME_CURRENT $subSleep $wakeTimer 1
          if ($LASTEXITCODE -ne 0) { throw 'Could not enable AC wake timers.' }

          & powercfg.exe /SETDCVALUEINDEX SCHEME_CURRENT $subSleep $wakeTimer 1
          if ($LASTEXITCODE -ne 0) { throw 'Could not enable battery wake timers.' }

          & powercfg.exe /SETACTIVE SCHEME_CURRENT
          if ($LASTEXITCODE -ne 0) { throw 'Could not reactivate the power plan.' }
      changed_when: false

    - name: Create daily wake and keep-awake task
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'

          $taskName = {{ maintenance_task_name | to_json }}
          $startTime = {{ maintenance_start_time | to_json }}
          $scriptPath = {{ maintenance_script | to_json }}
          $duration = {{ maintenance_duration_minutes }}

          $arguments = "-NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File `"$scriptPath`" -DurationMinutes $duration"

          $action = New-ScheduledTaskAction `
              -Execute "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" `
              -Argument $arguments

          $trigger = New-ScheduledTaskTrigger -Daily -At $startTime

          $settings = New-ScheduledTaskSettingsSet `
              -WakeToRun `
              -StartWhenAvailable `
              -AllowStartIfOnBatteries `
              -DontStopIfGoingOnBatteries `
              -ExecutionTimeLimit (New-TimeSpan -Minutes ($duration + 15)) `
              -MultipleInstances IgnoreNew

          $principal = New-ScheduledTaskPrincipal `
              -UserId 'SYSTEM' `
              -LogonType ServiceAccount `
              -RunLevel Highest

          Register-ScheduledTask `
              -TaskName $taskName `
              -Action $action `
              -Trigger $trigger `
              -Settings $settings `
              -Principal $principal `
              -Description 'Wake at 22:00 and prevent sleep for 120 minutes.' `
              -Force | Out-Null
      register: task_registration
      changed_when: true

    - name: Read task and wake timer status
      ansible.windows.win_powershell:
        script: |
          $taskName = {{ maintenance_task_name | to_json }}
          $task = Get-ScheduledTask -TaskName $taskName
          $info = Get-ScheduledTaskInfo -TaskName $taskName
          $wakeTimers = (& powercfg.exe /waketimers 2>&1 | Out-String).Trim()

          [PSCustomObject]@{
              Computer           = $env:COMPUTERNAME
              State              = $task.State.ToString()
              WakeToRun          = $task.Settings.WakeToRun
              StartWhenAvailable = $task.Settings.StartWhenAvailable
              NextRunTime        = $info.NextRunTime
              LastRunTime        = $info.LastRunTime
              LastTaskResult     = ('0x{0:X8}' -f [uint32]$info.LastTaskResult)
              WakeTimers         = $wakeTimers
          } | ConvertTo-Json -Compress
      register: wake_status
      changed_when: false

    - name: Show wake configuration
      ansible.builtin.debug:
        msg: "{{ wake_status.output[0] | from_json }}"
