---
- name: Secure Windows remote management
  hosts: windows
  gather_facts: false
  serial: 1

  vars:
    ssh_admin_user: localeero

    # Tailscale IP of the Ansible computer receiving RDP
    ansible_computer_ip: "100.109.80.96"

    # Change this to the Tailscale IP of your Windows 11 Home computer
    rdp_source_ip: "100.64.0.0/10"

  tasks:
    # ---------------------------------------------------------
    # SSH firewall
    # ---------------------------------------------------------

    - name: Remove bad SSH block rule
      community.windows.win_firewall_rule:
        name: "Block OpenSSH"
        state: absent

    - name: Remove default OpenSSH firewall rule
      community.windows.win_firewall_rule:
        name: "OpenSSH-Server-In-TCP"
        state: absent

    - name: Allow SSH only from Tailscale network
      community.windows.win_firewall_rule:
        name: "OpenSSH-Server-In-TCP"
        description: "Allow SSH only through Tailscale"
        localport: 22
        protocol: tcp
        action: allow
        direction: in
        remoteip: "100.64.0.0/10"
        profiles:
          - Domain
          - Private
          - Public
        enabled: true
        state: present

    # ---------------------------------------------------------
    # Login restrictions
    # ---------------------------------------------------------


    - name: Deny RDP logon for SSH administrator on client PCs
      ansible.windows.win_user_right:
        name: SeDenyRemoteInteractiveLogonRight
        users:
          - "{{ ssh_admin_user }}"
        action: add
      when: ansible_host != ansible_computer_ip

    - name: Allow RDP logon for SSH administrator on Ansible computer
      ansible.windows.win_user_right:
        name: SeDenyRemoteInteractiveLogonRight
        users:
          - "{{ ssh_admin_user }}"
        action: remove
      when: ansible_host == ansible_computer_ip

    # ---------------------------------------------------------
    # Remote Assistance
    # ---------------------------------------------------------

    - name: Disable Remote Assistance
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Remote Assistance'
        name: fAllowToGetHelp
        data: 0
        type: dword

    # ---------------------------------------------------------
    # RDP on Ansible computer
    # ---------------------------------------------------------

    - name: Enable Remote Desktop on Ansible computer
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server'
        name: fDenyTSConnections
        data: 0
        type: dword
      when: ansible_host == ansible_computer_ip

    - name: Require Network Level Authentication on Ansible computer
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
        name: UserAuthentication
        data: 1
        type: dword
      when: ansible_host == ansible_computer_ip

    - name: Disable default broad Remote Desktop firewall rules
      ansible.windows.win_powershell:
        script: |
          Get-NetFirewallRule `
            -DisplayGroup "Remote Desktop" `
            -ErrorAction SilentlyContinue |
          Disable-NetFirewallRule
      when: ansible_host == ansible_computer_ip

    - name: Remove previous restricted RDP rule
      community.windows.win_firewall_rule:
        name: "Remote Desktop from Windows 11 Home"
        state: absent
      when: ansible_host == ansible_computer_ip

    - name: Allow RDP only from Windows 11 Home Tailscale IP
      community.windows.win_firewall_rule:
        name: "Remote Desktop from Windows 11 Home"
        description: "Allow RDP only from trusted Windows 11 Home computer"
        direction: in
        action: allow
        protocol: tcp
        localport: 3389
        remoteip: "{{ rdp_source_ip }}"
        profiles:
          - Domain
          - Private
          - Public
        enabled: true
        state: present
      when: ansible_host == ansible_computer_ip

    # ---------------------------------------------------------
    # Disable RDP on all other managed Windows computers
    # ---------------------------------------------------------

    - name: Disable Remote Desktop on client computers
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server'
        name: fDenyTSConnections
        data: 1
        type: dword
      when: ansible_host != ansible_computer_ip

    - name: Disable Remote Desktop firewall group on client computers
      ansible.windows.win_powershell:
        script: |
          Get-NetFirewallRule `
            -DisplayGroup "Remote Desktop" `
            -ErrorAction SilentlyContinue |
          Disable-NetFirewallRule
      when: ansible_host != ansible_computer_ip

    - name: Remove restricted RDP rule from client computers
      community.windows.win_firewall_rule:
        name: "Remote Desktop from Windows 11 Home"
        state: absent
      when: ansible_host != ansible_computer_ip

    # ---------------------------------------------------------
    # OpenSSH configuration
    # ---------------------------------------------------------

    - name: Configure OpenSSH server authentication
      ansible.windows.win_powershell:
        script: |
          $path = "C:\ProgramData\ssh\sshd_config"

          if (-not (Test-Path $path)) {
              throw "OpenSSH configuration file does not exist: $path"
          }

          $settings = @{
              "PasswordAuthentication"       = "no"
              "PubkeyAuthentication"         = "yes"
              "KbdInteractiveAuthentication" = "no"
              "PermitEmptyPasswords"         = "no"
          }

          $content = Get-Content -Path $path -ErrorAction Stop

          foreach ($key in $settings.Keys) {
              $value = $settings[$key]
              $line = "$key $value"
              $pattern = "^\s*#?\s*$([regex]::Escape($key))\s+.*$"

              if ($content -match $pattern) {
                  $content = $content -replace $pattern, $line
              }
              else {
                  $content += $line
              }
          }

          Set-Content -Path $path -Value $content -Encoding ascii

    - name: Test sshd configuration
      ansible.windows.win_shell: |
        & "$env:WINDIR\System32\OpenSSH\sshd.exe" `
          -t `
          -f "C:\ProgramData\ssh\sshd_config"
      register: sshd_test
      changed_when: false

    - name: Restart OpenSSH Server safely
      ansible.windows.win_shell: |
        Start-Sleep -Seconds 3
        Restart-Service -Name sshd -Force
      async: 30
      poll: 0
      when: sshd_test.rc == 0
